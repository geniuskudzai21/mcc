services:
  # Web Service
  - type: web
    name: mutare-backend
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 7d

  # PostgreSQL Database (optional - you can also use external)
  - type: pserv
    name: mutare-db
    plan: free
    env: postgres
    ipAllowList: [] # Only allow internal connections
